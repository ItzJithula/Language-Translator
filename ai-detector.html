<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
  <meta charset="utf-8">
  <title>AI Text Detector — Bit X Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0F0F23;
      --bg-secondary: #1A1B2E;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --accent-start: #7C3AED;
      --accent-end: #8B5CF6;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --backdrop-blur: blur(20px);
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
    }

    [data-theme="light"] {
      --bg-primary: #F8FAFC;
      --bg-secondary: #FFFFFF;
      --glass-bg: rgba(0, 0, 0, 0.05);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      display: flex;
      flex-direction: column;
      padding: 20px;
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .top-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--glass-bg);
      backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 10px 20px;
      box-shadow: var(--shadow);
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s ease;
    }

    .back-btn:hover { color: var(--accent-start); }

    .theme-corner {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .theme-toggle {
      position: relative;
      width: 60px;
      height: 32px;
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 28px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: var(--backdrop-blur);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .theme-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 24px;
      height: 24px;
      background: var(--text-primary);
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .theme-toggle[data-theme="dark"] {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-color: var(--accent-end);
    }

    .theme-toggle[data-theme="dark"] .thumb {
      transform: translateX(28px);
      background: white;
    }

    .theme-toggle:hover { transform: scale(1.05); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 100px;
      padding-bottom: 60px;
    }

    .footer {
      padding: 16px 0;
      text-align: center;
      width: 100%;
    }

    .footer p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .footer a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .container {
      max-width: 800px;
      width: 100%;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .header-info {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-info p {
      color: var(--text-secondary);
      font-size: 16px;
      margin-top: 8px;
    }

    .wrapper {
      border-radius: 20px;
      overflow: hidden;
      background: var(--glass-bg);
      backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      margin-bottom: 24px;
    }

    .text-input {
      display: flex;
      flex-direction: column;
    }

    .text-input textarea {
      width: 100%;
      height: 250px;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-size: 18px;
      padding: 24px;
      color: var(--text-primary);
      font-family: inherit;
    }

    .text-input textarea::placeholder { color: var(--text-secondary); }

    .controls {
      padding: 15px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--glass-border);
      background: var(--glass-bg);
    }

    .char-count {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .detect-btn {
      width: 100%;
      padding: 18px;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .detect-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(124, 58, 237, 0.5);
    }

    .detect-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .result-container {
      margin-top: 30px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .result-main {
      grid-column: 1 / -1;
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
    }

    .result-score {
      font-size: 48px;
      font-weight: 700;
      margin: 10px 0;
    }

    .result-label {
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-box {
      background: var(--glass-bg);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      display: block;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .feedback-text {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .container { padding: 32px 20px; }
      .result-card { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .top-bar h1 { font-size: 18px; }
      .container { padding: 24px 16px; }
      .text-input textarea { height: 200px; padding: 20px; font-size: 16px; }
      .result-score { font-size: 36px; }
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <button class="back-btn" onclick="window.location.href='https://bit-x-tools.vercel.app/index.html'" title="Back">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1>AI Text Detector</h1>
  </div>

  <div class="theme-corner">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme" data-theme="dark">
      <span class="thumb"></span>
    </button>
  </div>

  <main>
    <div class="container">
      <div class="header-info">
        <p>Check if your text was written by a human or generated by AI.</p>
      </div>

      <div class="wrapper">
        <div class="text-input">
          <textarea id="inputText" spellcheck="false" placeholder="Paste your text here (minimum 25 characters for better accuracy)..."></textarea>
        </div>
        <div class="controls">
          <span class="char-count" id="charCount">0 characters</span>
          <button class="back-btn" id="clearBtn" title="Clear text">
            <i class="fas fa-trash-alt"></i> Clear
          </button>
        </div>
      </div>

      <button class="detect-btn" id="detectBtn">
        <i class="fas fa-search"></i> Analyze Text
      </button>

      <div class="result-container" id="resultContainer">
        <div class="result-card">
          <div class="result-main">
            <div class="result-label" id="resultLabel">Human Written</div>
            <div class="result-score" id="resultScore">100%</div>
            <div class="stat-label">Confidence Score</div>
          </div>
          
          <div class="stat-box">
            <span class="stat-value" id="humanWords">0</span>
            <span class="stat-label">Human Words</span>
          </div>
          
          <div class="stat-box">
            <span class="stat-value" id="aiWords">0</span>
            <span class="stat-label">AI Words</span>
          </div>

          <div class="feedback-text" id="feedbackText">
            Your text appears to be entirely human-written.
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Made with ❤ by Jithula Bhasitha for <a href="https://bit-x-tools.vercel.app/">Bit X Tools</a></p>
  </footer>

  <script>
    const inputText = document.getElementById('inputText');
    const charCount = document.getElementById('charCount');
    const detectBtn = document.getElementById('detectBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultContainer = document.getElementById('resultContainer');
    
    const resultLabel = document.getElementById('resultLabel');
    const resultScore = document.getElementById('resultScore');
    const humanWords = document.getElementById('humanWords');
    const aiWords = document.getElementById('aiWords');
    const feedbackText = document.getElementById('feedbackText');

    // Update character count
    inputText.addEventListener('input', () => {
      charCount.textContent = `${inputText.value.length} characters`;
      if (resultContainer.style.display === 'block') {
        resultContainer.style.opacity = '0.5';
      }
    });

    // Clear text
    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      charCount.textContent = '0 characters';
      resultContainer.style.display = 'none';
      inputText.focus();
    });

    // Detect AI Text
    detectBtn.addEventListener('click', async () => {
      const text = inputText.value.trim();
      if (!text) return;

      if (text.length < 10) {
        alert('Please enter at least 10 characters for analysis.');
        return;
      }

      detectBtn.disabled = true;
      detectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
      
      try {
        const response = await fetch(`https://api.bk9.dev/tools/txtdetect?q=${encodeURIComponent(text)}`);
        const json = await response.json();

        if (json.status && json.BK9 && json.BK9.success) {
          const data = json.BK9.data;
          
          resultContainer.style.display = 'block';
          resultContainer.style.opacity = '1';
          
          const isHuman = data.isHuman;
          resultScore.textContent = `${isHuman}%`;
          resultLabel.textContent = data.feedback;
          
          // Color coding based on score
          if (isHuman >= 80) {
            resultScore.style.color = 'var(--success)';
            resultLabel.style.color = 'var(--success)';
          } else if (isHuman >= 50) {
            resultScore.style.color = 'var(--warning)';
            resultLabel.style.color = 'var(--warning)';
          } else {
            resultScore.style.color = 'var(--danger)';
            resultLabel.style.color = 'var(--danger)';
          }

          humanWords.textContent = data.textWords - data.aiWords;
          aiWords.textContent = data.aiWords;
          feedbackText.textContent = data.additional_feedback || 'Analysis complete.';
          
          // Scroll to results
          resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          throw new Error('API Error');
        }
      } catch (error) {
        console.error(error);
        alert('An error occurred while analyzing the text. Please try again.');
      } finally {
        detectBtn.disabled = false;
        detectBtn.innerHTML = '<i class="fas fa-search"></i> Analyze Text';
      }
    });

    // Theme Toggle
    const themeToggle = document.getElementById("themeToggle");
    const html = document.documentElement;

    function setTheme(theme) {
      html.setAttribute("data-theme", theme);
      themeToggle.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    }

    themeToggle.addEventListener("click", () => {
      setTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });

    setTheme(localStorage.getItem("theme") || "dark");
  </script>

</body>
</html>
